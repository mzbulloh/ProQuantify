<svg width="400" height="800" viewBox="0 0 400 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.1"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="400" height="800" fill="#F4F5F7" />
  
  <!-- Header -->
  <rect width="400" height="90" fill="#FFFFFF" />
  <rect x="0" y="89" width="400" height="1" fill="#E5E7EB" />
  <circle cx="45" cy="55" r="20" fill="#2563EB" />
  <text x="45" y="61" font-family="Inter, sans-serif" font-size="16" fill="#FFFFFF" text-anchor="middle" font-weight="bold">PQ</text>
  <text x="75" y="50" font-family="Inter, sans-serif" font-size="16" fill="#111827" font-weight="600">ProQuantify Bot</text>
  <text x="75" y="68" font-family="Inter, sans-serif" font-size="12" fill="#10B981">bot</text>
  
  <!-- Date stamp -->
  <rect x="160" y="110" width="80" height="24" rx="12" fill="#E5E7EB" />
  <text x="200" y="126" font-family="Inter, sans-serif" font-size="12" fill="#6B7280" text-anchor="middle">Today</text>

  <!-- User Message 1 -->
  <rect x="120" y="160" width="260" height="70" rx="16" fill="#DCF8C6" filter="url(#shadow)" />
  <text x="135" y="185" font-family="Inter, sans-serif" font-size="14" fill="#111827">Hi, I need a quick quote for</text>
  <text x="135" y="205" font-family="Inter, sans-serif" font-size="14" fill="#111827">this part. Blueprint attached.</text>
  <text x="345" y="220" font-family="Inter, sans-serif" font-size="10" fill="#6B7280">14:30</text>

  <!-- User Message 2 (File) -->
  <rect x="180" y="240" width="200" height="60" rx="16" fill="#DCF8C6" filter="url(#shadow)" />
  <rect x="195" y="252" width="36" height="36" rx="8" fill="#2563EB" />
  <text x="213" y="275" font-family="Inter, sans-serif" font-size="12" fill="#FFFFFF" text-anchor="middle" font-weight="bold">PDF</text>
  <text x="240" y="265" font-family="Inter, sans-serif" font-size="14" fill="#111827" font-weight="500">bracket_v3.pdf</text>
  <text x="240" y="280" font-family="Inter, sans-serif" font-size="12" fill="#6B7280">4.2 MB</text>

  <!-- Bot Message 1 -->
  <rect x="20" y="320" width="280" height="50" rx="16" fill="#FFFFFF" filter="url(#shadow)" />
  <text x="35" y="350" font-family="Inter, sans-serif" font-size="14" fill="#111827">Received! Processing 2D blueprint...</text>

  <!-- Bot Message 2 (Quotation) -->
  <rect x="20" y="380" width="300" height="240" rx="16" fill="#FFFFFF" filter="url(#shadow)" />
  <rect x="20" y="380" width="300" height="40" rx="16" fill="#2563EB" />
  <!-- Overlap rect to make bottom square -->
  <rect x="20" y="400" width="300" height="20" fill="#2563EB" />
  <text x="170" y="405" font-family="Inter, sans-serif" font-size="14" fill="#FFFFFF" font-weight="bold" text-anchor="middle">MANUFACTURING QUOTATION</text>
  
  <text x="35" y="445" font-family="Inter, sans-serif" font-size="14" fill="#6B7280">Estimated Cost</text>
  <text x="285" y="445" font-family="Inter, sans-serif" font-size="18" fill="#111827" font-weight="bold" text-anchor="end">$450.00</text>
  <rect x="35" y="460" width="270" height="1" fill="#E5E7EB" />
  
  <text x="35" y="485" font-family="Inter, sans-serif" font-size="14" fill="#6B7280">Material</text>
  <text x="285" y="485" font-family="Inter, sans-serif" font-size="14" fill="#111827" font-weight="500" text-anchor="end">Aluminum 6061-T6</text>
  
  <text x="35" y="510" font-family="Inter, sans-serif" font-size="14" fill="#6B7280">Quantity</text>
  <text x="285" y="510" font-family="Inter, sans-serif" font-size="14" fill="#111827" font-weight="500" text-anchor="end">1 Unit</text>

  <text x="35" y="535" font-family="Inter, sans-serif" font-size="14" fill="#6B7280">Lead Time</text>
  <text x="285" y="535" font-family="Inter, sans-serif" font-size="14" fill="#111827" font-weight="500" text-anchor="end">5 Business Days</text>
  
  <!-- Buttons -->
  <rect x="35" y="565" width="115" height="36" rx="18" fill="#10B981" />
  <text x="92" y="588" font-family="Inter, sans-serif" font-size="12" fill="#FFFFFF" font-weight="bold" text-anchor="middle">Proceed to Order</text>
  
  <rect x="160" y="565" width="135" height="36" rx="18" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="1" />
  <text x="227" y="588" font-family="Inter, sans-serif" font-size="12" fill="#374151" font-weight="bold" text-anchor="middle">Request Changes</text>

  <!-- Input Field -->
  <rect x="0" y="720" width="400" height="80" fill="#FFFFFF" />
  <rect x="20" y="735" width="310" height="40" rx="20" fill="#F3F4F6" />
  <text x="40" y="760" font-family="Inter, sans-serif" font-size="14" fill="#9CA3AF">Message...</text>
  <circle cx="360" cy="755" r="20" fill="#2563EB" />
  <path d="M 353 750 L 368 755 L 353 760 Z" fill="#FFFFFF" />
</svg>
