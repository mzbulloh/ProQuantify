<svg width="1440" height="900" viewBox="0 0 1440 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow-dash" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.05"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="1440" height="900" fill="#F9FAFB" />
  
  <!-- Sidebar -->
  <rect width="260" height="900" fill="#111827" />
  <text x="30" y="50" font-family="Inter, sans-serif" font-size="24" fill="#FFFFFF" font-weight="bold">ProQuantify</text>
  
  <rect x="20" y="100" width="220" height="40" rx="8" fill="#1F2937" />
  <text x="60" y="125" font-family="Inter, sans-serif" font-size="14" fill="#FFFFFF" font-weight="500">Dashboard</text>
  
  <text x="60" y="175" font-family="Inter, sans-serif" font-size="14" fill="#9CA3AF" font-weight="500">Projects</text>
  <text x="60" y="225" font-family="Inter, sans-serif" font-size="14" fill="#9CA3AF" font-weight="500">Inventory</text>
  <text x="60" y="275" font-family="Inter, sans-serif" font-size="14" fill="#9CA3AF" font-weight="500">Analytics</text>
  <text x="60" y="325" font-family="Inter, sans-serif" font-size="14" fill="#9CA3AF" font-weight="500">Settings</text>
  
  <!-- Top Header -->
  <rect x="260" y="0" width="1180" height="80" fill="#FFFFFF" />
  <rect x="260" y="79" width="1180" height="1" fill="#E5E7EB" />
  <text x="300" y="47" font-family="Inter, sans-serif" font-size="20" fill="#111827" font-weight="600">Pipeline Analysis / Component-X42</text>
  
  <rect x="1230" y="20" width="120" height="40" rx="8" fill="#2563EB" />
  <text x="1290" y="45" font-family="Inter, sans-serif" font-size="14" fill="#FFFFFF" font-weight="600" text-anchor="middle">Export Quote</text>
  <circle cx="1390" cy="40" r="16" fill="#E5E7EB" />

  <!-- Main Content Area -->
  
  <!-- Left Panel: 2D Blueprint -->
  <rect x="300" y="110" width="550" height="750" rx="12" fill="#FFFFFF" filter="url(#shadow-dash)" stroke="#E5E7EB" stroke-width="1" />
  <text x="330" y="150" font-family="Inter, sans-serif" font-size="16" fill="#111827" font-weight="600">2D Feature Detection (YOLOv10)</text>
  <rect x="330" y="170" width="490" height="660" rx="8" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="1"/>
  
  <!-- Mock Blueprint Drawings -->
  <circle cx="575" cy="500" r="150" fill="none" stroke="#6B7280" stroke-width="2" />
  <circle cx="575" cy="500" r="100" fill="none" stroke="#6B7280" stroke-width="2" stroke-dasharray="5 5" />
  <line x1="425" y1="500" x2="725" y2="500" stroke="#6B7280" stroke-width="1" stroke-dasharray="10 5" />
  <line x1="575" y1="350" x2="575" y2="650" stroke="#6B7280" stroke-width="1" stroke-dasharray="10 5" />
  
  <!-- Bounding Boxes (YOLO detection) -->
  <rect x="420" y="340" width="80" height="80" fill="none" stroke="#2563EB" stroke-width="3" />
  <rect x="420" y="316" width="80" height="24" fill="#2563EB" />
  <text x="460" y="333" font-family="Inter, sans-serif" font-size="12" fill="#FFFFFF" font-weight="bold" text-anchor="middle">Hole A [99%]</text>

  <rect x="650" y="340" width="80" height="80" fill="none" stroke="#2563EB" stroke-width="3" />
  <rect x="650" y="316" width="80" height="24" fill="#2563EB" />
  <text x="690" y="333" font-family="Inter, sans-serif" font-size="12" fill="#FFFFFF" font-weight="bold" text-anchor="middle">Hole B [98%]</text>
  
  <!-- Right Panel Top: 3D Visualization -->
  <rect x="880" y="110" width="520" height="450" rx="12" fill="#FFFFFF" filter="url(#shadow-dash)" stroke="#E5E7EB" stroke-width="1" />
  <text x="910" y="150" font-family="Inter, sans-serif" font-size="16" fill="#111827" font-weight="600">3D Part Visualization</text>
  <rect x="910" y="170" width="460" height="360" rx="8" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1" />
  <!-- Simple isometric placeholder -->
  <polygon points="1140,250 1260,310 1260,430 1140,490 1020,430 1020,310" fill="#E2E8F0" stroke="#CBD5E1" stroke-width="2"/>
  <polygon points="1140,250 1260,310 1140,370 1020,310" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="2"/>
  <circle cx="1140" cy="310" r="30" fill="#CBD5E1" />
  
  <!-- Right Panel Bottom: Data Cards -->
  <rect x="880" y="590" width="245" height="270" rx="12" fill="#FFFFFF" filter="url(#shadow-dash)" stroke="#E5E7EB" stroke-width="1" />
  <text x="910" y="630" font-family="Inter, sans-serif" font-size="14" fill="#6B7280" font-weight="600">MATERIAL COST (USD)</text>
  <text x="910" y="670" font-family="Inter, sans-serif" font-size="32" fill="#111827" font-weight="bold">$42.50</text>
  <text x="1060" y="665" font-family="Inter, sans-serif" font-size="14" fill="#10B981" font-weight="bold">+4.2%</text>
  <!-- Mini chart -->
  <path d="M 910 750 Q 940 710, 970 730 T 1030 690 T 1090 700" fill="none" stroke="#2563EB" stroke-width="4" stroke-linecap="round" />
  
  <rect x="1155" y="590" width="245" height="270" rx="12" fill="#FFFFFF" filter="url(#shadow-dash)" stroke="#E5E7EB" stroke-width="1" />
  <text x="1185" y="630" font-family="Inter, sans-serif" font-size="14" fill="#6B7280" font-weight="600">MACHINING TIME</text>
  <text x="1185" y="670" font-family="Inter, sans-serif" font-size="32" fill="#111827" font-weight="bold">32m 15s</text>
  <text x="1340" y="665" font-family="Inter, sans-serif" font-size="14" fill="#EF4444" font-weight="bold">-1.8%</text>
  <!-- Bar chart -->
  <rect x="1185" y="740" width="16" height="40" rx="4" fill="#60A5FA" />
  <rect x="1215" y="720" width="16" height="60" rx="4" fill="#60A5FA" />
  <rect x="1245" y="700" width="16" height="80" rx="4" fill="#2563EB" />
  <rect x="1275" y="730" width="16" height="50" rx="4" fill="#60A5FA" />
  <rect x="1305" y="710" width="16" height="70" rx="4" fill="#60A5FA" />
</svg>
