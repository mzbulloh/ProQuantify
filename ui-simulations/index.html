<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProQuantify | Live System Demo</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        :root {
            --bg-body: #081220; 
            --bg-panel: rgba(11, 25, 44, 0.6); 
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #FFFFFF; 
            --text-muted: #94A3B8;
            --accent-cyan: #00E5FF; 
            --accent-violet: #B28DFF;
        }
        
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
        }
        
        body { 
            background-color: var(--bg-body); 
            font-family: 'Outfit', sans-serif; 
            height: 100vh; 
            overflow: hidden; 
            color: var(--text-main); 
        }

        .app-container { 
            height: 100%; 
            display: flex; 
            flex-direction: column; 
            padding: 12px; 
        }
        
        .top-toolbar { 
            background: rgba(0,0,0,0.3); 
            padding: 12px 20px; 
            border-radius: 12px; 
            border: 1px solid var(--glass-border);
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 12px; 
            flex-shrink: 0;
            backdrop-filter: blur(10px);
        }

        .split-view { 
            display: flex; 
            gap: 20px; 
            flex-grow: 1; 
            overflow: hidden; 
            align-items: stretch;
        }

        /* LEFT: MOBILE/SME VIEW */
        .mobile-col { 
            width: 300px; 
            display: flex; 
            flex-direction: column; 
            flex-shrink: 0; 
        }
        
        .col-header { 
            font-size: 13px; 
            font-weight: 600; 
            color: var(--text-muted); 
            margin-bottom: 8px; 
            text-transform: uppercase; 
            letter-spacing: 0.05em; 
            display: flex; 
            align-items: center; 
            gap: 6px; 
            font-family: 'Space Grotesk', sans-serif; 
        }
        
        .phone-mockup { 
            width: 100%; 
            height: 100%; 
            background: rgba(11,25,44,0.8); 
            border-radius: 16px; 
            border: 1px solid var(--glass-border); 
            box-shadow: 0 4px 6px rgba(0,0,0,0.3); 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            backdrop-filter: blur(10px);
        }
        
        .tg-header { 
            background: rgba(255,255,255,0.05); 
            height: 50px; 
            display: flex; 
            align-items: center; 
            padding: 0 12px; 
            border-bottom: 1px solid var(--glass-border); 
            flex-shrink: 0; 
        }
        
        .tg-avatar { 
            width: 32px; 
            height: 32px; 
            background: var(--accent-cyan); 
            color: #000; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            font-weight: 600; 
            border-radius: 50%; 
            margin-right: 10px; 
            font-size: 14px; 
            font-family: 'Space Grotesk', sans-serif; 
        }
        
        .tg-chat-area { 
            flex-grow: 1; 
            padding: 12px; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; 
            gap: 8px; 
        }
        
        .message { 
            max-width: 90%; 
            padding: 8px 10px; 
            font-size: 13px; 
            line-height: 1.4; 
            border-radius: 10px; 
            border: 1px solid var(--glass-border); 
        }
        
        .msg-bot { 
            background: rgba(255,255,255,0.05); 
            align-self: flex-start; 
            border-bottom-left-radius: 2px; 
        }
        
        .msg-user { 
            background: rgba(0,229,255,0.1); 
            border-color: rgba(0,229,255,0.2); 
            color: var(--accent-cyan); 
            align-self: flex-end; 
            border-bottom-right-radius: 2px; 
        }
        
        .msg-time { 
            float: right; 
            font-size: 10px; 
            color: var(--text-muted); 
            margin-top: 4px; 
            margin-left: 8px; 
        }
        
        .quote-card { 
            background: rgba(0,0,0,0.2); 
            border-radius: 6px; 
            border: 1px solid var(--glass-border); 
            width: 230px; 
            margin-top: 6px; 
            overflow: hidden; 
        }
        
        .quote-header { 
            padding: 6px 10px; 
            font-weight: 600; 
            font-size: 11px; 
            color: var(--accent-cyan); 
            background: rgba(0,229,255,0.05); 
            border-bottom: 1px solid var(--glass-border); 
            font-family: 'Space Grotesk', sans-serif; 
            text-transform: uppercase; 
        }
        
        .quote-header.pro { 
            background: rgba(178,141,255,0.05); 
            color: var(--accent-violet); 
            border-bottom-color: var(--glass-border); 
        }
        
        .quote-body { 
            padding: 8px 10px; 
            display: flex; 
            flex-direction: column; 
            gap: 4px; 
        }
        
        .quote-row { 
            display: flex; 
            justify-content: space-between; 
            font-size: 11px; 
        }
        
        .tg-input-area { 
            background: rgba(255,255,255,0.02); 
            padding: 8px 12px; 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            flex-shrink: 0; 
            border-top: 1px solid var(--glass-border); 
        }
        
        .tg-icon { 
            color: var(--text-muted); 
            font-size: 18px; 
        }

        /* RIGHT: WEB/FACTORY VIEW */
        .web-col { 
            flex-grow: 1; 
            display: flex; 
            flex-direction: column; 
            min-width: 0; 
        }
        
        .dashboard-ui { 
            background: var(--bg-panel); 
            border-radius: 12px; 
            border: 1px solid var(--glass-border); 
            flex-grow: 1; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            backdrop-filter: blur(20px); 
        }
        
        .dash-nav { 
            height: 50px; 
            border-bottom: 1px solid var(--glass-border); 
            display: flex; 
            align-items: center; 
            padding: 0 20px; 
            font-weight: 600; 
            font-size: 14px; 
            font-family: 'Space Grotesk', sans-serif; 
            letter-spacing: 1px; 
        }
        
        .dash-content { 
            flex-grow: 1; 
            display: grid; 
            grid-template-columns: 2fr 1fr; 
            overflow: hidden; 
        }
        
        .dash-panel { 
            padding: 16px; 
            border-right: 1px solid var(--glass-border); 
            display: flex; 
            flex-direction: column; 
            overflow-y: auto; 
            background: rgba(0,0,0,0.2); 
        }
        
        .dash-panel:last-child { 
            border-right: none; 
        }
        
        .section-title { 
            font-size: 12px; 
            font-weight: 600; 
            color: var(--text-muted); 
            text-transform: uppercase; 
            margin-bottom: 12px; 
            font-family: 'Space Grotesk', sans-serif; 
            letter-spacing: 1px; 
        }
        
        .blueprint-canvas { 
            width: 100%; 
            height: 200px; 
            background: #060d17; 
            border: 1px solid var(--glass-border); 
            border-radius: 6px;
            position: relative; 
            overflow: hidden; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            margin-bottom: 16px;
            box-shadow: inset 0 0 30px rgba(0,229,255,0.05);
        }
        
        .info-card { 
            background: rgba(255,255,255,0.02); 
            border: 1px solid var(--glass-border); 
            padding: 12px; 
            border-radius: 6px; 
            margin-bottom: 10px; 
            backdrop-filter: blur(5px); 
        }
        
        .ic-title { 
            font-size: 11px; 
            color: var(--text-muted); 
            margin-bottom: 4px; 
            font-weight: 400; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
        }
        
        .ic-val { 
            font-size: 16px; 
            font-weight: 600; 
            font-family: 'Space Grotesk', sans-serif; 
        }
        
        .status-list { 
            list-style: none; 
            padding: 0; 
            margin: 0; 
            font-size: 12px; 
            font-family: 'Space Grotesk', monospace; 
        }
        
        .status-item { 
            padding: 6px 0; 
            border-bottom: 1px solid var(--glass-border); 
            display: flex; 
            gap: 6px; 
            color: var(--text-muted); 
        }
        
        .status-ok { 
            color: var(--accent-cyan); 
            text-shadow: 0 0 5px rgba(0,229,255,0.3); 
        }
        
        .status-pro { 
            color: var(--accent-violet); 
        }

        .btn-primary { 
            background: rgba(0,229,255,0.1); 
            color: var(--accent-cyan); 
            border: 1px solid var(--accent-cyan); 
            padding: 8px 16px; 
            border-radius: 6px; 
            font-size: 12px; 
            font-weight: 600; 
            cursor: pointer; 
            transition: 0.3s; 
            font-family: 'Space Grotesk', sans-serif; 
            text-transform: uppercase; 
            letter-spacing: 1px;
        }
        
        .btn-primary:hover:not(:disabled) { 
            background: var(--accent-cyan); 
            color: #000; 
            box-shadow: 0 0 15px rgba(0,229,255,0.4); 
        }
        
        .btn-primary:disabled { 
            background: rgba(255,255,255,0.05); 
            color: var(--text-muted); 
            border-color: var(--glass-border); 
            cursor: not-allowed; 
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [simStage, setSimStage] = useState(0);
            
            const [tgMessages, setTgMessages] = useState([{ id: 1, sender: 'bot', type: 'text', text: 'ProQuantify System Active. Send your CAD file to generate a quote.' }]);
            const [isTyping, setIsTyping] = useState(false);
            const [webLogs, setWebLogs] = useState([]);
            
            const chatEndRef = useRef(null);
            const currentTime = "11:54";

            useEffect(() => { 
                chatEndRef.current?.scrollIntoView({ behavior: 'smooth' }); 
            }, [tgMessages, isTyping]);

            const runSimulation = () => {
                if (simStage !== 0) return;
                setSimStage(1);
                
                setTgMessages(prev => [...prev, { id: Date.now(), sender: 'user', type: 'file', filename: 'gearbox_housing_rev3.pdf', size: '6.8 MB' }]);
                setWebLogs(prev => [...prev, { type: 'ok', text: "> System Ingest: gearbox_housing_rev3.pdf" }]);
                
                setTimeout(() => setIsTyping(true), 500);

                setTimeout(() => {
                    setIsTyping(false);
                    setTgMessages(prev => [...prev, {
                        id: Date.now(), sender: 'bot', type: 'basic_quote',
                        part: 'Gearbox Housing', size: '245x178x55 mm', specs: 'Alum 6061-T6', cost: 'NT$12,450'
                    }]);
                    setWebLogs(prev => [...prev, 
                        { type: 'ok', text: "[OK] Geometry Kernel: Central Bore (Ø85mm) verified." },
                        { type: 'ok', text: "[OK] Geometry Kernel: 8x M8 Bolt Flange verified." }
                    ]);
                }, 2500);

                setTimeout(() => {
                    setTgMessages(prev => [...prev, { id: Date.now(), sender: 'bot', type: 'text', text: 'Matching part geometry with supplier network...' }]);
                    setIsTyping(true);
                    setWebLogs(prev => [...prev, { type: 'pro', text: "[PRO] Routing execution: 3-Axis CNC Milling identified." }]);
                }, 4000);

                setTimeout(() => {
                    setIsTyping(false);
                    setTgMessages(prev => [...prev, {
                        id: Date.now(), sender: 'bot', type: 'pro_quote',
                        time: '145.5 Mins', routing: '3-Axis CNC Milling', supplier: 'QingFeng Machinery', match: '98.5% Capability Match'
                    }]);
                    setWebLogs(prev => [...prev, { type: 'pro', text: "[PRO] Supplier Match Secured: QingFeng Machinery" }]);
                }, 6500);

                setTimeout(() => {
                    setIsTyping(true);
                }, 7500);

                setTimeout(() => {
                    setIsTyping(false);
                    setTgMessages(prev => [...prev, {
                        id: Date.now(), sender: 'bot', type: 'final_pdf',
                        filename: 'BoQ_QingFeng_Quote.pdf', size: '1.2 MB'
                    }]);
                    setWebLogs(prev => [...prev, { type: 'ok', text: "> PDF Rendered. Bill of Quantities transmitted." }]);
                    setSimStage(2);
                }, 8500);
            };

            const resetSim = () => {
                setSimStage(0);
                setTgMessages([{ id: 1, sender: 'bot', type: 'text', text: 'ProQuantify System Active. Send your CAD file to generate a quote.' }]);
                setWebLogs([]);
                setIsTyping(false);
            };

            return (
                <div className="app-container">
                    <div className="top-toolbar">
                        <div style={{fontWeight: 600, fontSize: '13px', color: 'var(--text-main)', fontFamily: "'Space Grotesk', sans-serif", letterSpacing: '1px'}}>
                            <i className="fa-solid fa-rotate" style={{color: 'var(--accent-cyan)', marginRight: '8px'}}></i> CROSS-PLATFORM DEMO
                        </div>
                        <div style={{display: 'flex', gap: '10px'}}>
                            <button onClick={resetSim} style={{background: 'rgba(255,255,255,0.05)', color: 'var(--text-muted)', border: '1px solid var(--glass-border)', padding: '6px 12px', borderRadius: '6px', cursor: 'pointer', fontSize: '12px', fontFamily: "'Space Grotesk', sans-serif"}}>RESET</button>
                            <button className="btn-primary" onClick={runSimulation} disabled={simStage !== 0} style={{padding: '6px 16px', fontSize: '12px'}}>INITIALIZE</button>
                        </div>
                    </div>

                    <div className="split-view">
                        
                        <div className="mobile-col">
                            <div className="col-header"><i className="fa-solid fa-mobile-screen"></i> SME Client Interface</div>
                            <div className="phone-mockup">
                                <div className="tg-header">
                                    <i className="fa-solid fa-arrow-left" style={{color: 'var(--text-muted)', fontSize: '14px', marginRight: '12px'}}></i>
                                    <div className="tg-avatar">PQ</div>
                                    <div style={{lineHeight: 1.2}}>
                                        <div style={{fontWeight: 600, color: '#FFF', fontSize:'13px', fontFamily: "'Space Grotesk', sans-serif"}}>ProQuantify Edge</div>
                                        <div style={{color: 'var(--accent-cyan)', fontSize: '10px', letterSpacing: '1px'}}>SYSTEM ONLINE</div>
                                    </div>
                                </div>
                                
                                <div className="tg-chat-area">
                                    <div style={{textAlign: 'center', fontSize: '11px', color: 'var(--text-muted)', margin: '4px 0'}}>Today</div>
                                    {tgMessages.map(msg => (
                                        <div key={msg.id} className={`message ${msg.sender === 'bot' ? 'msg-bot' : 'msg-user'}`}>
                                            {msg.type === 'text' && <div>{msg.text} <span className="msg-time">{currentTime}</span></div>}
                                            
                                            {msg.type === 'file' && (
                                                <div style={{display:'flex', gap:'10px', alignItems:'center'}}>
                                                    <div style={{width:'32px', height:'32px', background:'rgba(0,229,255,0.2)', color:'var(--accent-cyan)', borderRadius:'6px', display:'flex', justifyContent:'center', alignItems:'center'}}><i className="fa-solid fa-file-pdf"></i></div>
                                                    <div>
                                                        <div style={{fontWeight: 500, color: '#FFF'}}>{msg.filename}</div>
                                                        <div style={{fontSize: '11px', color: 'var(--accent-cyan)'}}>{msg.size}</div>
                                                    </div>
                                                </div>
                                            )}
                                            
                                            {msg.type === 'basic_quote' && (
                                                <div className="quote-card">
                                                    <div className="quote-header">Phase 1: Extraction</div>
                                                    <div className="quote-body">
                                                        <div className="quote-row"><span style={{color: 'var(--text-muted)'}}>Item</span><span style={{color: '#FFF'}}>{msg.part}</span></div>
                                                        <div className="quote-row"><span style={{color: 'var(--text-muted)'}}>Material</span><span style={{color: '#FFF'}}>{msg.specs}</span></div>
                                                        <div style={{height:'1px', background:'var(--glass-border)', margin:'2px 0'}}></div>
                                                        <div className="quote-row"><span style={{color: 'var(--text-muted)'}}>Est. Price</span><span style={{color: 'var(--accent-cyan)', fontWeight: 'bold'}}>{msg.cost}</span></div>
                                                    </div>
                                                </div>
                                            )}
                                            
                                            {msg.type === 'pro_quote' && (
                                                <div className="quote-card">
                                                    <div className="quote-header pro">Phase 2: Network Match</div>
                                                    <div className="quote-body">
                                                        <div className="quote-row"><span style={{color: 'var(--text-muted)'}}>Required</span><span style={{color: '#FFF'}}>{msg.routing}</span></div>
                                                        <div className="quote-row"><span style={{color: 'var(--text-muted)'}}>Assigned</span><span style={{color: 'var(--accent-violet)'}}>{msg.supplier}</span></div>
                                                        <div className="quote-row"><span style={{color: 'var(--text-muted)'}}>Status</span><span style={{color: '#FFF'}}>{msg.match}</span></div>
                                                    </div>
                                                </div>
                                            )}

                                            {msg.type === 'final_pdf' && (
                                                <div style={{display:'flex', gap:'10px', alignItems:'center', background:'rgba(255,255,255,0.05)', padding:'8px', borderRadius:'6px', border:'1px solid rgba(0,229,255,0.3)', marginTop:'4px'}}>
                                                    <div style={{width:'32px', height:'32px', background:'var(--accent-cyan)', color:'#000', borderRadius:'50%', display:'flex', justifyContent:'center', alignItems:'center'}}><i className="fa-solid fa-arrow-down"></i></div>
                                                    <div>
                                                        <div style={{fontWeight: 500, color: '#FFF'}}>{msg.filename}</div>
                                                        <div style={{fontSize: '11px', color: 'var(--text-muted)'}}>BoQ Document Ready</div>
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    ))}
                                    {isTyping && <div style={{fontSize: '12px', color: 'var(--text-muted)', fontStyle: 'italic'}}>Processing data...</div>}
                                    <div ref={chatEndRef} />
                                </div>
                                
                                <div className="tg-input-area">
                                    <i className="fa-solid fa-paperclip tg-icon" style={{color: simStage === 0 ? 'var(--accent-cyan)' : 'var(--text-muted)'}}></i>
                                    <div style={{flexGrow: 1, color: 'var(--text-muted)', fontSize: '13px'}}>Message</div>
                                    <i className="fa-solid fa-microphone tg-icon"></i>
                                </div>
                            </div>
                        </div>

                        <div className="web-col">
                            <div className="col-header"><i className="fa-solid fa-desktop"></i> Enterprise Operator Dashboard</div>
                            <div className="dashboard-ui">
                                <div className="dash-nav">
                                    <div style={{background: 'var(--accent-cyan)', color: '#000', padding: '2px 8px', borderRadius: '4px', marginRight: '10px', fontSize: '11px', fontWeight: 'bold'}}>PRO</div>
                                    SYSTEM PIPELINE VIEW
                                </div>
                                
                                <div className="dash-content">
                                    <div className="dash-panel">
                                        <div className="section-title">Geometric Target</div>
                                        <div className="blueprint-canvas">
                                            <svg width="180" height="180" viewBox="0 0 100 100" style={{opacity: simStage > 0 ? 0.9 : 0.1, transition:'0.5s', stroke: 'var(--accent-cyan)', strokeWidth: '0.8', fill: 'none', filter: 'drop-shadow(0 0 5px rgba(0,229,255,0.4))'}}>
                                                <circle cx="50" cy="50" r="40" strokeDasharray="2,2" />
                                                <circle cx="50" cy="50" r="25" />
                                                <line x1="50" y1="10" x2="50" y2="90" strokeDasharray="1,2" />
                                                <line x1="10" y1="50" x2="90" y2="50" strokeDasharray="1,2" />
                                                <circle cx="50" cy="18" r="2" /><circle cx="50" cy="82" r="2" />
                                                <circle cx="18" cy="50" r="2" /><circle cx="82" cy="50" r="2" />
                                            </svg>
                                            {simStage === 2 && (
                                                <div style={{position: 'absolute', top: '35%', left: '35%', width: '30%', height: '30%', border: '1px solid var(--accent-cyan)', background: 'rgba(0,229,255,0.1)', boxShadow: '0 0 15px rgba(0,229,255,0.2)'}}></div>
                                            )}
                                        </div>
                                        
                                        <div className="section-title">Execution Terminal</div>
                                        <ul className="status-list">
                                            {webLogs.length === 0 && <li style={{opacity: 0.5}}>Awaiting external payload...</li>}
                                            {webLogs.map((log, i) => (
                                                <li key={i} className="status-item">
                                                    <span className={log.type === 'ok' ? 'status-ok' : 'status-pro'}>{log.text}</span>
                                                </li>
                                            ))}
                                        </ul>
                                    </div>
                                    
                                    <div className="dash-panel" style={{background: 'rgba(0,0,0,0.4)'}}>
                                        <div className="section-title">Metrics & Output</div>
                                        
                                        <div className="info-card">
                                            <div className="ic-title">Active Client ID</div>
                                            <div className="ic-val" style={{fontSize: '14px', color: '#FFF'}}>{simStage > 0 ? 'SME-092-TW' : '---'}</div>
                                        </div>
                                        
                                        <div className="info-card">
                                            <div className="ic-title">Computed Cost Baseline</div>
                                            <div className="ic-val" style={{color: '#FFF'}}>{simStage >= 1 ? 'NT$12,450.00' : '---'}</div>
                                        </div>
                                        
                                        <div className="info-card" style={{borderLeft: '3px solid var(--accent-violet)', background: simStage >= 2 ? 'rgba(178,141,255,0.05)' : 'rgba(255,255,255,0.02)'}}>
                                            <div className="ic-title" style={{color: 'var(--accent-violet)'}}>Supplier Network [PRO]</div>
                                            <div className="ic-val" style={{color: 'var(--accent-violet)'}}>{simStage >= 2 ? 'QingFeng Machinery' : '---'}</div>
                                            <div style={{fontSize: '11px', color: 'var(--text-muted)', marginTop: '4px'}}>
                                                {simStage >= 2 ? 'Time: 145.5m | Process: 3-Axis CNC' : 'Pending routing logic...'}
                                            </div>
                                        </div>
                                        
                                        <button className="btn-primary" style={{marginTop: 'auto'}} disabled={simStage !== 2}>
                                            <i className="fa-solid fa-file-pdf mr-2"></i> Export BoQ PDF
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
